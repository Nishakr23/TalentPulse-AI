methodology_summary: |
  TalentPulse AI is a deterministic rule-based ranker designed for transparent candidate-job matching without LLMs during inference. The system parses structured candidate data and scores profiles across five weighted components: skills match, title and career progression, years of experience, location fit, and education relevance. 
  Skills scoring uses an endorsement-weighted and duration-based trust multiplier to penalize keyword stuffing and reward genuine expertise. Title matching acts as the decisive signal against inflated roles by analyzing career trajectory rather than surface keywords. Behavioral signals like job-hopping and tenure consistency apply multiplicative modifiers to the base score.
  The ranker enforces strict compute constraints: CPU-only, no network calls during ranking, and sub-5-minute runtime for 50K candidates on 16GB RAM. Pre-computation is limited to one-time TF-IDF vectorization of skill taxonomies. All scoring logic is explicit and auditable, producing ranked XLSX output with component-wise score breakdowns for explainability.
  Key differentiators include anti-gaming heuristics for common CV traps, deterministic outputs for compliance, and human-readable reasoning logs. The approach prioritizes precision and fairness over black-box ML, ensuring recruiters can defend every ranking decision. Runtime averages 8 seconds for 10K candidates on standard hardware.

